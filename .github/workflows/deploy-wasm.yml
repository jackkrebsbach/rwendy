# .github/workflows/deploy.yml
name: Build and deploy wasm R package repository
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  deploy-cran-repo:
    uses: r-wasm/actions/.github/workflows/deploy-cran-repo.yml@v3
    with:
      packages: "jackkrebsbach/rwendy"
    permissions:
      repository-projects: read
      pages: write
      id-token: write